name: 自动更新股票数据
on:
  schedule:
    # 每小时更新一次（北京时间），cron是UTC时间，对应北京时间8点-23点每小时整点更新
    - cron: '0 0-15 * * 1-5'
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动触发更新

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install axios

      - name: 执行股票数据拉取脚本
        run: node scripts/update-data.js
        env:
          TZ: Asia/Shanghai

      - name: 提交更新后的数据
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新股票数据 - $(date +'%Y-%m-%d %H:%M')"
          git push
